<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="menu-toggle" id="mobile-menu">☰</div>

         

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="AboutMe.html">About Me</a></li>
            <li><a href="Portfolio.html">Portfolio</a></li>
            <li><a href="Commissions.html">Commissions</a></li>
            <li><a href="Contact.html">Contact Me!</a></li>
        </ul>

      <div class="star">✦</div>

    </nav>
</header>

<main class="contact-page">

    <div class="contact-container">


        <!-- LEFT SIDE -->
        <section class="contact-info">

            <h1>Let's Connect</h1>

            <div class="divider"></div>

            <p>I'd love to hear more from you!</p>

            <div class="contact-links">
                <a href="mailto:norintarou1@gmail.com">
                <i class="fa-solid fa-envelope"></i>
                <span>norintarou1@gmail.com</span>
                </a>
                
                <a href="https://www.linkedin.com/in/BetaAngie" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
                <span>linkedin.com/in/BetaAngie</span>
                </a>
                
                <a href="https://www.instagram.com/Haru.ke1" target="_blank">
                <i class="fa-brands fa-instagram"></i>
                <span>@Haru.ke1</span>
                </a>
            </div>

            <div class="social-links">
                  <!-- X -->
                <a href="https://x.com/yourusername" target="_blank" aria-label="X">
                    <i class="fa-brands fa-x-twitter"></i> </a>
                <!-- TikTok -->
                <a href="https://www.tiktok.com/@yourusername" target="_blank" aria-label="TikTok">
                    <i class="fa-brands fa-tiktok"></i></a>
                <!-- Carrd -->
                <a href="https://yourname.carrd.co" target="_blank" aria-label="Carrd">
                    <i class="fa-regular fa-id-card"></i></a>
            </div>
        </section>

        <!-- RIGHT SIDE -->
        <section class="contact-form">
            <h2>Let's get in Touch.</h2>
            <form action="https://formspree.io/f/mrenakqk" method="POST">
                <label for="name">
                    Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="John Doe"
                    required>

                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="email@domain.com"
                    required>

                <label for="subject">
                    Subject
                </label>

                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Commission Inquiry"
                    required>

                <label for="message">
                    Message
                </label>

                <textarea
                    id="message"
                    name="message"
                    rows="12"
                    placeholder="Write your message here..."></textarea>

                <input
                    type="submit"
                    value="Send Message">


            </form>


        </section>


    </div>

</main>

<script src="script.js"></script>    
    
</body>
</html>
